<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala - Jogo da Vida</title>

  <link rel="stylesheet" href="../static/css/menu.css">
  <link rel="stylesheet" href="../static/css/sala.css">
</head>
<body>

  <main class="sala-container">

    <header class="topo-sala">
      <h1>Jogo da Vida</h1>
      <p>Código: <strong id="codigoSala">----</strong></p>
      <p>Status: <strong id="statusSala">---</strong></p>
      <p>Turno de: <strong id="jogadorDaVez">---</strong></p>

      <button id="btnIniciarPartida" class="btn-iniciar escondido">
        Iniciar partida
      </button>
    </header>

    <section class="area-mensagem">
      <p id="textoAcao">Aguardando jogadores...</p>
    </section>

    <section class="area-sorteio">
      <p>Número sorteado</p>
      <div id="numeroSorteado" class="numero-sorteado">?</div>
      <p id="descricaoNumero" class="descricao-numero"></p>

      <button id="btnSortearNumero">Sortear número</button>
    </section>

    <section class="layout-jogo">

      <aside class="cemiterio">
        <h2>☠ Cemitério</h2>
        <div id="listaMortos"></div>
      </aside>

      <section class="area-jogadores">
        <h2>Jogadores vivos</h2>
        <div id="listaJogadores" class="lista-jogadores"></div>
      </section>

    </section>

  </main>

  <div id="modalExpulsar" class="modal-expulsar escondido">
    <div class="modal-expulsar-conteudo">
      <h2>Expulsar jogador</h2>
      <p id="textoModalExpulsar">Deseja expulsar este jogador?</p>

      <div class="modal-botoes">
        <button id="btnConfirmarExpulsao" class="btn-confirmar-expulsao">
          Sim, expulsar
        </button>

        <button id="btnCancelarExpulsao" class="btn-cancelar-expulsao">
          Cancelar
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../static/js/supabase.js"></script>
  <script src="../static/js/sala.js"></script>
</body>
</html>
